_schema-version: "3.2"
ID: nadec-e2e-governance
description: NADEC E2E Delivery Governance — CAP service + Fiori portal on BTP (XSUAA SSO)
version: 0.1.0

# ---------------------------------------------------------------------------
# XSUAA variant: a standalone approuter fronts the portal and enforces XSUAA
# login (SSO); the CAP srv validates the XSUAA token (AUTH_MODE=xsuaa) and
# resolves roles from the DB Users table. UI5 apps are bundled into the
# approuter's resources folder (html5 module). See mta-xsuaa-reference.yaml.
#
# Build & deploy (cds build run manually with the global cds-dk, then):
#   cds build --production
#   mbt build
#   cf deploy mta_archives/nadec-e2e-governance_0.1.0.mtar
# ---------------------------------------------------------------------------

parameters:
  enable-parallel-deployments: true

modules:
  # HANA schema + seed deployer
  - name: nadec-e2e-governance-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 1024M
    requires:
      - name: nadec-e2e-governance-hdi

  # CAP backend service — OData + /login roster + /auth (auth = XSUAA)
  - name: nadec-e2e-governance-srv
    type: nodejs
    path: gen/srv
    build-parameters:
      builder: custom
      commands: []
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1024M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: nadec-e2e-governance-hdi
      - name: nadec-e2e-governance-uaa
      - name: nadec-e2e-governance-destination
      - name: nadec-e2e-governance-jwt
    properties:
      NODE_ENV: production
      AUTH_MODE: xsuaa
      # JWT_SECRET is NO LONGER set here. The signing secret lives only in the bound
      # 'nadec-e2e-governance-jwt' user-provided service (generated value, created
      # out-of-band) and is read from VCAP_SERVICES at runtime — never in git.
      SF_DESTINATION_NAME: "SF_PRD_Raw"

  # Standalone approuter — XSUAA login (SSO) + static UI5 + OData proxy
  - name: nadec-e2e-governance-app
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 1024M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: nadec-e2e-governance-uaa
    build-parameters:
      # Bundle the static UI5 apps into the approuter's resources folder.
      requires:
        - name: nadec-e2e-governance-ui
          artifacts:
            - "./*"
          target-path: resources

  # The static UI5 / Fiori Elements apps (served by the approuter)
  - name: nadec-e2e-governance-ui
    type: html5
    path: app
    build-parameters:
      builder: custom
      commands: []
      build-result: .
      supported-platforms: []

resources:
  # XSUAA — authentication (no role scopes; roles live in the app DB Users table)
  - name: nadec-e2e-governance-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  # HANA Cloud (HDI container)
  - name: nadec-e2e-governance-hdi
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # BTP Destination service (access to the SuccessFactors "SF_PRD_Raw" destination)
  - name: nadec-e2e-governance-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  # JWT signing secret — a user-provided service holding { "jwt-secret": "<generated>" }.
  # The value lives ONLY in this service, never in git. Create it once before the
  # first deploy (and rotate by re-running with a new value):
  #   cf cups nadec-e2e-governance-jwt -p "{\"jwt-secret\":\"$(openssl rand -hex 32)\"}"
  #   # rotate later:  cf uups nadec-e2e-governance-jwt -p "{\"jwt-secret\":\"$(openssl rand -hex 32)\"}"
  - name: nadec-e2e-governance-jwt
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: nadec-e2e-governance-jwt
